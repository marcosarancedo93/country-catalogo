<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Home & Deco</title>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #8a6940;
    font-family: 'Work Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* LOGO */
  .logo-wrap {
    margin-bottom: 6px;
  }

  .logo-wrap img {
    width: 130px;
    height: 130px;
    border-radius: 16px;
    object-fit: cover;
  }

  /* BRAND NAME */
  .brand {
    font-family: 'Forum', serif;
    font-size: 1.7em;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #f5ead8;
    margin-top: 14px;
    text-align: center;
  }

  .tagline {
    font-size: 0.68em;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(245, 234, 216, 0.7);
    margin-top: 5px;
    text-align: center;
  }

  /* DIVIDER */
  .divider {
    width: 40px;
    height: 1px;
    background: #c4a87a;
    margin: 22px auto 26px;
    opacity: 0.6;
  }

  /* LINKS */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    background: rgba(44, 31, 14, 0.18);
    border: 1px solid rgba(44, 31, 14, 0.25);
    border-radius: 8px;
    text-decoration: none;
    color: #f5ead8;
    font-size: 0.88em;
    font-weight: 400;
    letter-spacing: 1px;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .link-btn:hover {
    background: rgba(44, 31, 14, 0.28);
    border-color: rgba(44, 31, 14, 0.4);
  }

  .link-btn .icon {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-catalog { background: rgba(196, 168, 122, 0.15); }
  .icon-wa      { background: rgba(37, 211, 102, 0.12); }
  .icon-ml      { background: rgba(255, 230, 0, 0.10); }
  .icon-ig      { background: rgba(193, 53, 132, 0.12); }
  .icon-fb      { background: rgba(24, 119, 242, 0.12); }

  .link-btn .label {
    flex: 1;
    text-align: center;
    font-family: 'Work Sans', sans-serif;
    font-size: 0.95em;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #e8d5b5;
  }

  .link-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* SOCIAL ICONS ROW */
  .social-row {
    display: flex;
    gap: 18px;
    margin-top: 28px;
    justify-content: center;
  }

  .social-row a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(245, 234, 216, 0.45);
    color: #f5ead8;
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s;
  }

  .social-row a:hover {
    color: #fff;
    border-color: #f5ead8;
  }

  .social-row svg {
    width: 16px;
    height: 16px;
  }

  /* FOOTER */
  .footer {
    margin-top: 32px;
    font-size: 0.62em;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245, 234, 216, 0.45);
    text-align: center;
  }
</style>
</head>
